  authDomain: "login-project-3d3f7.firebaseapp.com",
  projectId: "login-project-3d3f7",
  storageBucket: "login-project-3d3f7.firebasestorage.app",
  messagingSenderId: "623879160616",
  appId: "1:623879160616:web:ef8107c93509d50228461d",
  measurementId: "G-8MS37M9B6S"
 };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth).then(() => {
      alert("Logged out ✅");
      window.location.href = "index.html";
    });
  });
</script>

</body>
